services:
  - type: web
    name: co2-reduction-support
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-5
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOW_SIGNUP
        value: "true"
      - key: MAX_FILE_MB
        value: "15"
      - key: MAX_LOGO_MB
        value: "2"
      - key: ETS_PRICE_LOW
        value: "1700"
      - key: ETS_PRICE_HIGH
        value: "4300"
