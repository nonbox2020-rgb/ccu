<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>製品DB · CO2削減サポート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="wrap">
    <div class="page-head" style="display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap">
      <div>
        <div class="eyebrow" id="eyebrow"></div>
        <h1 class="page-title">製品データベース</h1>
        <p class="page-sub">診断で照合する自社製品を登録します。単価・CO<sub>2</sub>排出係数・照合キーワードを正確に設定してください。</p>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap">
        <button class="btn" id="seedBtn"></button>
        <button class="btn btn-primary" id="addBtn"></button>
      </div>
    </div>

    <div class="card">
      <div class="table-scroll">
        <table class="ptable" id="ptable">
          <thead><tr>
            <th>製品名</th><th>区分</th><th class="num">単価</th><th>単位</th>
            <th class="num">CO₂/単位</th><th class="num">基準CO₂</th><th>算定根拠</th><th></th>
          </tr></thead>
          <tbody id="ptbody"></tbody>
        </table>
      </div>
      <div id="emptyState"></div>
    </div>

    <div class="foot-note" id="footNote"></div>
  </main>

  <!-- modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-head"><h3 id="modalTitle">製品を追加</h3><button class="btn-ghost" id="closeModal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="f_id">
        <label class="field"><span>製品名 <small>必須</small></span><input type="text" id="f_name" placeholder="CR LIMEX フローリング"></label>
        <div class="grid2">
          <label class="field"><span>区分</span><input type="text" id="f_category" placeholder="床材"></label>
          <label class="field"><span>単位</span><input type="text" id="f_unit" placeholder="m2"></label>
        </div>
        <div class="grid2">
          <label class="field"><span>単価（円）</span><input type="number" class="num-input" id="f_price" placeholder="7800"></label>
          <label class="field"><span>CO₂排出係数（kg/単位）</span><input type="number" step="0.01" class="num-input" id="f_co2" placeholder="2.3"></label>
        </div>
        <label class="field"><span>基準CO₂（置換される既存資材のkg/単位）<small>削減量の計算に使用</small></span><input type="number" step="0.01" class="num-input" id="f_baseline" placeholder="8.0"></label>
        <label class="field"><span>照合キーワード <small>カンマ区切り。見積書の品名に含まれると照合されます</small></span><input type="text" id="f_keywords" placeholder="フローリング,複合フローリング,床材"></label>
        <label class="field"><span>CO₂算定根拠 <small>LCA算定方法・検証機関・算定年など</small></span><input type="text" id="f_source" placeholder="例）第三者検証済みEPD（2025年取得）"></label>
        <label class="field checkbox-field"><input type="checkbox" id="f_verified"><span>第三者検証済みデータ（診断結果に「検証済」と表示されます）</span></label>
        <label class="field"><span>説明</span><textarea id="f_desc" placeholder="製品の特徴・用途"></textarea></label>
      </div>
      <div class="modal-foot">
        <button class="btn" id="cancelBtn">キャンセル</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
